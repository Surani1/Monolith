# 2. СУЩНОСТИ
- type: entity
  id: BaseBoforsPart
  parent: BaseItem
  abstract: true
  components:
  #- type: Item
  #  size: Ginormous
  #  sprite: _NF/Objects/Specific/Research/rped.rsi
  - type: Sprite
    sprite: _NF/Objects/Specific/Research/rped.rsi
    state: icon
  - type: MultiHandedItem
  - type: HeldSpeedModifier
    walkModifier: 0.2
    sprintModifier: 0.2
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnLand
    damage:
      types:
        Blunt: 20

- type: entity
  id: BoforsChassisUnfinished
  parent: BaseBoforsPart
  name: артиллерийский станок
  description: Несущая конструкция, жестко интегрированная в силовой набор корабля. Это база, на которой собирается всё орудие. Она обеспечивает распределение веса установки, устойчивость при стрельбе и является неподвижной платформой, относительно которой работают все остальные механизмы наведения.
  components:
  - type: Sprite
    sprite: _NF/Objects/Specific/Research/rped.rsi
    state: icon
    color: "#555555"
  - type: Construction
    graph: Bofors
    node: start
    defaultTarget: bofors

- type: entity
  id: BoforsCoreItem
  parent: BaseBoforsPart
  name: тяжелое реакторное ядро Bofors
  description: Высокоплотный энергетический накопитель, разработанный для питания систем наведения и механизмов автоматического заряжания орудий серии Bofors. Ядро содержит стабилизированный изотопный заряд, обеспечивающий стабильную подачу энергии даже при критических нагрузках во время интенсивного ведения огня. Компонент имеет усиленный композитный корпус для предотвращения утечки радиации при повреждении установки.
  components:
    - type: Tag
      tags:
      - BoforsCoreItem

- type: entity
  id: BoforsFeedItem
  parent: BaseBoforsPart
  name: подача Bofors
  components:
    - type: Tag
      tags:
      - BoforsFeedItem

- type: entity
  id: BoforsTargetingItem
  parent: BaseBoforsPart
  name: радар Bofors
  components:
    - type: Tag
      tags:
      - BoforsTargetingItem

- type: entity
  id: BoforsBarrelItem
  parent: BaseBoforsPart
  name: стволы Bofors
  components:
    - type: Tag
      tags:
      - BoforsBarrelItem

- type: entity
  id: BoforsWorkPiece
  parent: BaseBoforsPart
  name: заготовка Bofors
  components:
  - type: CrucibleRecipe
    processingTime: 60
    resultEntity: rped


