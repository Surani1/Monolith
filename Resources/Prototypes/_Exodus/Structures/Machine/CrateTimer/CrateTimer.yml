- type: entity
  id: BluespaceTimerBeacon
  parent: BaseStructure
  name: ent-BluespaceTimerBeacon
  description: ent-BluespaceTimerBeacon-desc
  components:
  - type: Sprite
    sprite: Structures/Power/borg_charger.rsi
    layers:
    - state: borgcharger-u1
      map: ["enum.Content.Shared._Exodus.CrateTimer.TimerCrateVisuals.State"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.Content.Shared._Exodus.CrateTimer.TimerCrateVisuals.State:
        enum.Content.Shared._Exodus.CrateTimer.TimerCrateState.Idle:
          enum.Content.Shared._Exodus.CrateTimer.TimerCrateVisuals.State: { state: borgcharger-u1 }
        enum.Content.Shared._Exodus.CrateTimer.TimerCrateState.Activating:
          enum.Content.Shared._Exodus.CrateTimer.TimerCrateVisuals.State: { state: borgcharger-u2 }
        enum.Content.Shared._Exodus.CrateTimer.TimerCrateState.Cooldown:
          enum.Content.Shared._Exodus.CrateTimer.TimerCrateVisuals.State: { state: borgcharger-u1 }
  - type: PointLight
    enabled: false
    radius: 3
    energy: 2
    color: "#ff0000"
  - type: TimerCrate
    activationDelay: 900
    cooldownDelay: 2700
    cratePrototype: CrateSyndicateSurplusBundle
    startSound: /Audio/Machines/Nuke/confirm_beep.ogg
    loopSound: /Audio/Machines/Nuke/general_beep.ogg
    finishSound: /Audio/Effects/teleport_arrival.ogg
    loopDelay: 1
    loopVolume: -6
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: Clickable
