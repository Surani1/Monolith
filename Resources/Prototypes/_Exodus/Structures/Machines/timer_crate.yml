- type: entity
  id: BluespaceTimerBeacon
  parent: BaseStructure
  name: "блюспейс маяк"
  description: "Устройство для вызова припасов Синдиката."
  components:
  - type: Sprite
    sprite: Structures/Power/borg_charger.rsi
    layers:
    - state: borgcharger-u1
  - type: Appearance
  - type: TimerCrate
    activationDelay: 900
    cooldownDelay: 2700
    cratePrototype: CrateSyndicateSurplusBundle
    offState: borgcharger-u1
    onState: borgcharger-u0
  - type: UserInterface
    interfaces:
      enum.TimerCrateUiKey.Key:
        type: TimerCrateBoundUserInterface
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
